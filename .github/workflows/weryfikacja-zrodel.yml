# Cotygodniowa automatyczna weryfikacja wszystkich źródeł w bazie.
# Martwy link => czerwony run => GitHub wysyła mail właścicielowi repo.
# Raport SOURCES-REPORT.md jest commitowany z powrotem do repo (widoczny w historii).
name: Weryfikacja źródeł

on:
  schedule:
    - cron: '0 6 * * 1'   # każdy poniedziałek 06:00 UTC
  workflow_dispatch: {}    # + ręczne uruchomienie z zakładki Actions

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Walidacja schematu danych
        run: node tools/validate.js
      - name: Sprawdzenie wszystkich URL-i źródeł
        id: probe
        run: node tools/check_sources.js
      - name: Commit raportu (także gdy są martwe linki)
        if: always()
        run: |
          git config user.name "skadprodukt-bot"
          git config user.email "actions@users.noreply.github.com"
          git add SOURCES-REPORT.md
          git diff --cached --quiet || git commit -m "auto: raport weryfikacji zrodel [skip ci]"
          git push
